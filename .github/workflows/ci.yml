name: "🎭 Backstage CI"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-test:
    name: "🏗️ Build & Test"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backstage
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable
        working-directory: .

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Dependencies
        run: yarn install --immutable

      - name: TypeScript Check
        run: yarn tsc --skipLibCheck

      - name: Build
        run: yarn build:all

      - name: Lint
        run: yarn lint:all

      - name: Test
        run: yarn test:all
        env:
          CI: true
